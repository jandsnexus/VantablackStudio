<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantablack Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
  :root {
    --bg: #050508;
    --text: #e8e6e1;
    --accent: #c9a55a;
    --accent-dim: rgba(201, 165, 90, 0.15);
    --subtle: #2a2a30;
  }
 
  html { cursor: none; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
 
  /* --- CUSTOM CURSOR --- */
  .cursor {
    position: fixed;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease, opacity 0.2s ease;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  .cursor-dot {
    position: fixed;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
  }
 
  /* --- GRAIN OVERLAY --- */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 150px;
  }
 
  /* --- AMBIENT GLOW --- */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: glowIn 3s ease 2.5s forwards;
    filter: blur(80px);
  }
 
  @keyframes glowIn {
    to { opacity: 1; }
  }
 
  /* --- BORDER FRAME --- */
  .frame {
    position: fixed;
    inset: 20px;
    border: 1px solid var(--subtle);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    animation: frameIn 1.5s ease 3s forwards;
  }
  @keyframes frameIn {
    to { opacity: 1; }
  }
 
  /* --- CORNER MARKS --- */
  .corner {
    position: fixed;
    width: 20px;
    height: 20px;
    z-index: 51;
    opacity: 0;
    animation: cornerIn 1s ease 3.3s forwards;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .corner::before { width: 1px; height: 20px; }
  .corner::after { width: 20px; height: 1px; }
 
  .corner-tl { top: 14px; left: 14px; }
  .corner-tl::before { top: 0; left: 0; }
  .corner-tl::after { top: 0; left: 0; }
 
  .corner-tr { top: 14px; right: 14px; }
  .corner-tr::before { top: 0; right: 0; }
  .corner-tr::after { top: 0; right: 0; }
 
  .corner-bl { bottom: 14px; left: 14px; }
  .corner-bl::before { bottom: 0; left: 0; }
  .corner-bl::after { bottom: 0; left: 0; }
 
  .corner-br { bottom: 14px; right: 14px; }
  .corner-br::before { bottom: 0; right: 0; }
  .corner-br::after { bottom: 0; right: 0; }
 
  @keyframes cornerIn {
    to { opacity: 1; }
  }
 
  /* --- MAIN CONTENT --- */
  .content {
    text-align: center;
    position: relative;
    z-index: 10;
  }
 
  /* --- LOGO LINE --- */
  .logo-line {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 40px;
    transform: scaleX(0);
    animation: lineIn 1s ease 0.5s forwards;
  }
  @keyframes lineIn {
    to { transform: scaleX(1); }
  }
 
  /* --- TITLE --- */
  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(3rem, 8vw, 7rem);
    letter-spacing: 0.04em;
    line-height: 1.05;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .title-line {
    display: block;
    overflow: hidden;
  }
  .title-line span {
    display: inline-block;
    transform: translateY(110%);
    animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .title-line:nth-child(1) span { animation-delay: 0.8s; }
  .title-line:nth-child(2) span { animation-delay: 1.0s; }
 
  @keyframes textReveal {
    to { transform: translateY(0); }
  }
 
  .title-line:nth-child(2) span {
    font-style: italic;
    color: var(--accent);
  }
 
  /* --- SUBTITLE --- */
  .subtitle {
    font-weight: 200;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #777;
    margin-top: 30px;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.8s forwards;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  /* --- DIVIDER --- */
  .divider {
    width: 1px;
    height: 50px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    margin: 35px auto 0;
    opacity: 0;
    animation: fadeUp 1s ease 2.2s forwards;
  }
 
  /* --- STATUS --- */
  .status {
    margin-top: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1s ease 2.6s forwards;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .status-text {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    font-weight: 300;
  }
 
  /* --- BOTTOM NAV HINT --- */
  .bottom-info {
    position: fixed;
    bottom: 35px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 51;
    opacity: 0;
    animation: fadeUp 1s ease 3.5s forwards;
  }
  .bottom-info span {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
    font-weight: 300;
  }
 
  /* --- MOBILE --- */
  @media (max-width: 768px) {
    .frame { inset: 12px; }
    .corner-tl { top: 6px; left: 6px; }
    .corner-tr { top: 6px; right: 6px; }
    .corner-bl { bottom: 6px; left: 6px; }
    .corner-br { bottom: 6px; right: 6px; }
    .bottom-info { padding: 0 25px; bottom: 22px; }
    .cursor, .cursor-dot { display: none; }
    html { cursor: auto; }
  }
</style>
</head>
<body>
 
<div class="grain"></div>
<div class="glow" id="glow"></div>
<div class="frame"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
 
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>
 
<div class="content">
  <div class="logo-line"></div>
  <h1 class="title">
    <span class="title-line"><span>Vantablack</span></span>
    <span class="title-line"><span>Studio</span></span>
  </h1>
  <p class="subtitle">Digital Experiences — Redefined</p>
  <div class="divider"></div>
  <div class="status">
    <span class="status-dot"></span>
    <span class="status-text">Coming Soon</span>
  </div>
</div>
 
<div class="bottom-info">
  <span>© 2026 Vantablack Studio</span>
  <span>München, DE</span>
</div>
 
<script>
  const cursor = document.getElementById('cursor');
  const cursorDot = document.getElementById('cursorDot');
  const glow = document.getElementById('glow');
 
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let cursorX = mouseX, cursorY = mouseY;
 
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursorDot.style.left = mouseX + 'px';
    cursorDot.style.top = mouseY + 'px';
    glow.style.left = (mouseX - 300) + 'px';
    glow.style.top = (mouseY - 300) + 'px';
  });
 
  function animateCursor() {
    cursorX += (mouseX - cursorX) * 0.12;
    cursorY += (mouseY - cursorY) * 0.12;
    cursor.style.left = cursorX + 'px';
    cursor.style.top = cursorY + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();
</script>
</body>
</html>
